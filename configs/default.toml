[nats]
url = "nats://localhost:4222"
max_reconnects = 60
reconnect_wait = "2s"
request_timeout = "10s"

[database]
path = "crawlerdb.sqlite"

[crawler]
user_agent = "CrawlerDB/1.0"
max_depth = 10
pool_size = 10
request_timeout = "30s"
default_rate_limit = "1s"
max_retries = 3
robots_ttl = "24h"
content_dir = "data"

[server]
addr = ":8081"
