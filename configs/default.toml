[nats]
url = "nats://localhost:4222"
max_reconnects = 60
reconnect_wait = "2s"
request_timeout = "10s"
jetstream_dir = ".crawlerdb/jetstream"
object_store_bucket = "crawlerdb-transfer"
object_store_ttl = "24h"
object_store_max_bytes = 21474836480

[database]
path = "crawlerdb.sqlite"

[crawler]
user_agent = "CrawlerDB/1.0"
max_depth = 10
pool_size = 10
request_timeout = "30s"
default_rate_limit = "1s"
max_retries = 3
robots_ttl = "24h"
content_dir = "data"

[server]
addr = ":8081"
